<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-sale=1.0">
        <meta name="description" content="Contact Us Page">
        <meta name="author" content="Murillo de Jesus">
        <link rel="stylesheet" href="style/rafting.css">
        <title>Rafting Time | Contact Us</title>
    </head>
    <body>
        <header>
                <img src="images/Rafting_logo_min2.png" alt="Rafting_logo" width="200">
            <nav>
                <nav><a href="index.html">Home</a></nav>
                <nav><a href="about.html">About Us</a></nav>
                <nav><a href="trips.html">Trips</a></nav>
                <nav><a href="contact.html">Contact</a></nav>
            </nav>
        </header>
        <main>
            <div class="history adventure">
                <article>
                    <h1>Contact Us</h1>
                    <h2>Send us a Message</h2>
                    <p>Rafting Time</p>
                    <p>Phone: +55 111 11111-1111</p>
                    <p>Email: raftingtime_now@gmail.com</p>
                    <div class="map">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d28618.47547661894!2d-53.58305408411757!3d-25.526952351467067!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1707298459917!5m2!1spt-BR!2sbr" width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                    <figure>
                        <img src="images/emp1.jpg" alt="Agatha">
                        <figcaption>Aghata, responsable by the agendas</figcaption>
                    </figure>
                    <figure>
                        <img src="images/emp3.jpg" alt="Emma">
                        <figcaption>Emma, responsable by your safety</figcaption>
                    </figure>
                    <figure>
                        <img src="images/emp2.jpg" alt="Max">
                        <figcaption>Max, responsable by the Path on the River</figcaption>
                    </figure>
                </article>
            </div>
            <form>
                <fieldset>
                    <label for="wname"><span class="question-number">1.</span>What is your name?</label>
                    <input type="text" id="wname" name="wname" placeholder="Name">
                    <label for="email"><span class="question-number">2.</span>What is your Email?</label>
                    <input type="text" id="email" name="email" placeholder="Email">
                    <label for="message"><span class="question-number">3.</span>Choose one</label>
                    <label for="general">General Inquiry<input type="radio" id="general" value="general" ></label>
                    <label for="reservation">Reservation Question<input type="radio" id="reservation" value="reservation" ></label>
                    <label for="website">Website Suggestion<input type="radio" id="website" value="website" ></label>
                    <label for="message"><span class="question-number">4.</span>Message:</label>
                    <textarea id="message" name="message" rows="3" placeholder="Send a Message for us"></textarea>
                    <label for="mycheckbox"><span class="question-number">5.</span>Please subscribe me to the monthly newsletter</label>
                    <input type="checkbox" id=mycheckbox name=mycheckbox class="checkbox-custom" >
                    <button type="submit">Submit Quiz</button>
                </fieldset>
            </form>
        </main>
        <footer>
            <article>
                <p>&#169;2024 &#127760; Murillo de Jesus &#127760; São Bento do Sul, Brazil</p>
                <a href="https://facebook.com">
                    <img src="images/facebook.svg" alt="Facebook">

                <a href="https://twitter.com">

                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram.svg" alt="Instagram">
                </a>
            </article>
        </footer>
    </body>
</html>
