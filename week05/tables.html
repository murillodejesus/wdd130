<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link rel="stylesheet" href="tables.css">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta name=" description" content="Tables">
        <meta name="author" content="Murillo de Jesus">
        <title>Murillo de Jesus | WDD 130</title>
    </head>
    <body>
        <table>
            <caption>Table 1: A Try It Example</caption>
            <thead>
                <tr>
                    <th colspan="2">The Table Header</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Cell 1</td>
                    <td>Cell 2</td>
                </tr>
                <tr>
                    <td>Cell 3</td>
                    <td rowspan="2">Cell 4</td>
                </tr>
                <tr>
                    <td>Cell 5</td>
                </tr>
            </tbody>
        </table>
        <form>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname"><br>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname">
        </form>
    </body>
    <footer>

    </footer>
</html>
